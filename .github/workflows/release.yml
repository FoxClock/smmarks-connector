name: Release

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest

    # Uses PyPI's Trusted Publisher (OIDC) — no API token required.
    # Configure a publisher at https://pypi.org/manage/account/publishing/
    environment: pypi
    permissions:
      id-token: write   # required for OIDC token exchange with PyPI
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # dist/ is the default upload directory — no extra config needed.
